services:
  ml-api:
    build: .
    container_name: ml_engagement_api
    ports:
      - "8002:8002"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount direktori project agar model pkl tersimpan permanen
      - .:/app
    command: sh -c "pip install requests && uvicorn main:app --host 0.0.0.0 --port 8002"
    networks:

      - hoax-net

networks:
  hoax-net:
    external: true
    name: hoax-detector-api_default


